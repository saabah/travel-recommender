<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VayaQuest</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO SECTION -->
<div id="hero">
  <div class="overlay">
    <h1>🌏 VayaQuest</h1>
    <p>Your Next Dream Destination, powered by AI</p>
    <button onclick="enterApp()">Start Exploring →</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">

  <!-- INTRO -->
  <div id="intro">
    <h2>Welcome to VayaQuest</h2>
    <p>
      Whether you’re chasing cherry blossoms in Kyoto 🌸, relaxing in Fiji 🏖️,
      or exploring London 🏰 — we help you find your perfect match.
    </p>

    <button onclick="startQuiz()">Begin Quiz</button>
  </div>

  <!-- QUIZ -->
  <div id="quizSection" style="display:none;">
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="questionBox" class="fade"></div>

    <div class="nav">
      <button onclick="prev()">Back</button>
      <button onclick="next()">Next</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

</div>

<script src="app.js"></script>
</body>
</html>
