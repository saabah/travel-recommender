<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Recommender</title>
<style>
    body { font-family: Arial; background:#f5f7fa; padding:20px; }
    .container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:10px; }
    h1 { text-align:center; }
    .question { margin-bottom:20px; }
    select { width:100%; padding:8px; }
    button { padding:12px; width:100%; background:#0077cc; color:white; border:none; border-radius:6px; }
    .result { margin-top:30px; }
    .card { padding:15px; margin:10px 0; background:#eef3f8; border-radius:8px; }
</style>
</head>
<body>

<div class="container">
<h1>🌍 Travel Destination Finder</h1>

<div id="quiz"></div>

<button onclick="calculate()">Find My Destination</button>

<div id="results" class="result"></div>
</div>

<script>

// -----------------------------
// QUESTIONS
// -----------------------------
const questions = [
    { id: "budget", text: "Budget", options: [1,2,3,4] },
    { id: "flight", text: "Flight tolerance", options: [1,2,3,4] },
    { id: "exchange", text: "Exchange importance", options: [3,2,1] },
    { id: "activity", text: "Activity level", options: [1,2,3] },
    { id: "culture", text: "Cultural comfort", options: [3,2,1] },
    { id: "climate", text: "Climate", options: [1,2,3] },
    { id: "kids", text: "Kids", options: [1,2,3,4] },
    { id: "pace", text: "Travel pace", options: [1,2,3] },
    { id: "food", text: "Food preference", options: [1,2,3] },
    { id: "goal", text: "Goal", options: [3,1] },
    { id: "vibe", text: "Vibe", options: [1,2,3] }
];

// -----------------------------
// CITY DATA (Sample — plug full 50 cities here)
// Scores are 1–7 aligned with your dataset
// -----------------------------
const cities = [
    {
        name: "Bali",
        affordability: 7,
        accessibility: 6,
        experience: 4,
        family: 6,
        culture: 5,
        tags: ["cheap","family","short-haul"]
    },
    {
        name: "Tokyo",
        affordability: 4,
        accessibility: 5,
        experience: 7,
        family: 6,
        culture: 7,
        tags: ["culture","food","safe"]
    },
    {
        name: "Paris",
        affordability: 3,
        accessibility: 3,
        experience: 6,
        family: 4,
        culture: 6,
        tags: ["long-haul","romantic"]
    },
    {
        name: "Gold Coast",
        affordability: 5,
        accessibility: 7,
        experience: 5,
        family: 7,
        culture: 3,
        tags: ["kids","easy","domestic"]
    },
    {
        name: "Dubai",
        affordability: 4,
        accessibility: 4,
        experience: 6,
        family: 7,
        culture: 5,
        tags: ["luxury","family"]
    }
];

// -----------------------------
// RENDER QUESTIONS
// -----------------------------
const quizDiv = document.getElementById("quiz");

questions.forEach(q => {
    let html = `<div class="question"><label>${q.text}</label>
    <select id="${q.id}">`;
    
    q.options.forEach(opt => {
        html += `<option value="${opt}">${opt}</option>`;
    });

    html += `</select></div>`;
    quizDiv.innerHTML += html;
});

// -----------------------------
// CALCULATE MATCH
// -----------------------------
function calculate() {

    let user = {};
    questions.forEach(q => {
        user[q.id] = parseInt(document.getElementById(q.id).value);
    });

    let results = cities.map(city => {

        let score =
            (user.budget * city.affordability) +
            (user.flight * city.accessibility) +
            (user.activity * city.experience) +
            (user.kids * city.family) +
            (user.culture * city.culture);

        return { ...city, score };
    });

    results.sort((a,b) => b.score - a.score);

    let top3 = results.slice(0,3);
    let wildcard = results.slice(3,5);

    display(top3, wildcard, user);
}

// -----------------------------
// DISPLAY RESULTS
// -----------------------------
function display(top3, wildcard, user) {

    let div = document.getElementById("results");
    div.innerHTML = "<h2>🏆 Top Destinations</h2>";

    top3.forEach(c => {
        div.innerHTML += renderCard(c, user);
    });

    div.innerHTML += "<h2>🎯 Wildcard Picks</h2>";

    wildcard.forEach(c => {
        div.innerHTML += renderCard(c, user);
    });
}

// -----------------------------
// EXPLANATION ENGINE
// -----------------------------
function renderCard(city, user) {

    let reasons = [];

    if(user.flight <= 2 && city.accessibility >=6)
        reasons.push("Matches your low-flight preference");

    if(user.kids >=3 && city.family >=6)
        reasons.push("Great for toddlers / kids");

    if(user.budget <=2 && city.affordability >=6)
        reasons.push("Strong AUD value");

    if(user.activity >=3 && city.experience >=6)
        reasons.push("High-energy destination");

    if(user.culture <=2 && city.culture >=6)
        reasons.push("Comfortable cultural experience");

    return `
    <div class="card">
        <h3>${city.name}</h3>
        <p><b>Why:</b></p>
        <ul>
            ${reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>
    </div>
    `;
}

</script>

</body>
</html>
